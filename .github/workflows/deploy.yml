# Дублює GitHub webhook: корисно, якщо webhook не спрацював.
# Потрібні secrets: DEPLOY_WEBHOOK_URL, GITHUB_WEBHOOK_SECRET
name: Deploy to PythonAnywhere

on:
  push:
    branches: [main, master]

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ping deploy webhook on PythonAnywhere
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL not set — skip (use GitHub repo webhook instead)"
            exit 0
          fi
          payload='{"ref":"refs/heads/main"}'
          hash=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$GITHUB_WEBHOOK_SECRET" | awk '{print $2}')
          curl -fsS -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=${hash}" \
            -d "$payload"
